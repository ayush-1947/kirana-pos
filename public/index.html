<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Kirana POS</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />

  <!-- Libraries via CDN -->
  <script src="https://unpkg.com/quagga@0.12.1/dist/quagga.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     HEADER / NAV
═══════════════════════════════════════════════════════ -->
<header class="app-header">
  <div class="header-left">
    <div class="logo-mark">K</div>
    <div class="header-titles">
      <span class="header-title">KIRANA POS</span>
      <span class="header-sub" id="headerDate"></span>
    </div>
  </div>
  <nav class="header-nav">
    <button class="nav-btn active" data-view="pos" onclick="showView('pos')">
      <svg viewBox="0 0 24 24"><path d="M9 22c.55 0 1-.45 1-1v-1h4v1c0 .55.45 1 1 1s1-.45 1-1v-1h1c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2H7c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h1v1c0 .55.45 1 1 1zm-2-4V5h10v13H7z"/></svg>
      <span>POS</span>
    </button>
    <button class="nav-btn" data-view="products" onclick="showView('products')">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
      <span>Products</span>
    </button>
    <button class="nav-btn" data-view="history" onclick="showView('history')">
      <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      <span>History</span>
    </button>
  </nav>
</header>

<!-- ═══════════════════════════════════════════════════════
     VIEW: POS
═══════════════════════════════════════════════════════ -->
<main id="view-pos" class="view active">

  <!-- Quick Action Bar -->
  <div class="action-bar">
    <button class="action-btn primary" onclick="openScanner()">
      <svg viewBox="0 0 24 24"><path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M19 5h-6v6h6V5zm-6 8h1.5v1.5H13V13zm1.5 1.5H16V16h-1.5v-1.5zM16 13h1.5v1.5H16V13zm-3 3h1.5v1.5H13V16zm1.5 1.5H16V19h-1.5v-1.5zM16 16h1.5v1.5H16V16zm1.5-1.5H19V16h-1.5v-1.5zM19 13h1.5v1.5H19V13zm0 3h1.5v1.5H19V16z"/></svg>
      Scan Barcode
    </button>
    <button class="action-btn secondary" onclick="openManualAdd()">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
      Add Manual
    </button>
    <button class="action-btn tertiary" onclick="openSearch()">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      Search
    </button>
  </div>

  <!-- Barcode Input (manual keyboard fallback) -->
  <div class="barcode-input-row">
    <input type="text" id="barcodeInput" placeholder="Type or scan barcode..." 
           inputmode="numeric" autocomplete="off" 
           onkeydown="if(event.key==='Enter') lookupBarcode(this.value)" />
    <button onclick="lookupBarcode(document.getElementById('barcodeInput').value)">
      <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </button>
  </div>

  <!-- Cart -->
  <section class="cart-section">
    <div class="section-header">
      <span class="section-title">Cart</span>
      <span class="cart-count" id="cartCount">0 items</span>
      <button class="clear-btn" onclick="clearCart()">Clear</button>
    </div>

    <div id="cartEmpty" class="cart-empty">
      <svg viewBox="0 0 24 24" style="width:48px;height:48px;opacity:0.3"><path d="M17 18c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96C5 16.1 6.9 18 9 18h12v-2H9.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0023.44 5H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM9 18c-1.1 0-1.99.9-1.99 2S7.9 22 9 22s2-.9 2-2-.9-2-2-2z"/></svg>
      <p>Cart is empty</p>
      <p class="empty-sub">Scan a barcode or search to add products</p>
    </div>

    <div id="cartItems" class="cart-items"></div>
  </section>

  <!-- Bill Summary -->
  <section class="bill-summary" id="billSummary" style="display:none">
    <div class="summary-row">
      <span>Subtotal</span>
      <span id="summarySubtotal">₹0.00</span>
    </div>
    <div class="summary-row tax-row">
      <span>GST (5%)</span>
      <span id="summaryTax">₹0.00</span>
    </div>
    <div class="summary-row total-row">
      <span>TOTAL</span>
      <span id="summaryTotal">₹0.00</span>
    </div>
    <button class="checkout-btn" onclick="openCheckout()">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
      Generate Bill & Pay
    </button>
  </section>

</main>

<!-- ═══════════════════════════════════════════════════════
     VIEW: PRODUCTS
═══════════════════════════════════════════════════════ -->
<main id="view-products" class="view">
  <div class="view-header">
    <h2>Product Catalogue</h2>
    <button class="icon-btn" onclick="openManualAdd()">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
    </button>
  </div>
  <div class="search-bar">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input type="search" id="productSearch" placeholder="Search products..." oninput="searchProducts(this.value)" />
  </div>
  <div class="export-bar">
    <button class="export-btn" onclick="exportData()">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      Export JSON
    </button>
    <span id="productCountBadge" class="badge">0 products</span>
  </div>
  <div id="productList" class="product-list"></div>
</main>

<!-- ═══════════════════════════════════════════════════════
     VIEW: HISTORY
═══════════════════════════════════════════════════════ -->
<main id="view-history" class="view">
  <div class="view-header">
    <h2>Sales History</h2>
    <div id="statsBar" class="stats-bar"></div>
  </div>
  <div id="salesList" class="sales-list"></div>
</main>

<!-- ═══════════════════════════════════════════════════════
     MODALS
═══════════════════════════════════════════════════════ -->

<!-- Scanner Modal -->
<div id="modalScanner" class="modal">
  <div class="modal-content scanner-modal">
    <div class="modal-header">
      <h3>Scan Barcode</h3>
      <button class="close-btn" onclick="closeScanner()">✕</button>
    </div>
    <div id="scannerViewport" class="scanner-viewport">
      <div class="scan-line"></div>
      <div class="scan-corners"></div>
    </div>
    <p class="scanner-hint">Point camera at barcode · Hold steady</p>
    <div id="scannerStatus" class="scanner-status"></div>
  </div>
</div>

<!-- Add/Edit Product Modal -->
<div id="modalProduct" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="productModalTitle">Add Product</h3>
      <button class="close-btn" onclick="closeModal('modalProduct')">✕</button>
    </div>
    <form id="productForm" onsubmit="saveProduct(event)" class="product-form">
      <div class="form-group">
        <label>Barcode *</label>
        <input type="text" id="pBarcode" placeholder="Scan or type barcode" required autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" id="pName" placeholder="e.g. Parle-G 100g" required autocomplete="off" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price (₹) *</label>
          <input type="number" id="pPrice" placeholder="0.00" step="0.01" min="0" required />
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input type="number" id="pStock" placeholder="0" min="0" />
        </div>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="pCategory">
          <option value="General">General</option>
          <option value="Biscuits">Biscuits</option>
          <option value="Beverages">Beverages</option>
          <option value="Dairy">Dairy</option>
          <option value="Bakery">Bakery</option>
          <option value="Noodles">Noodles</option>
          <option value="Groceries">Groceries</option>
          <option value="Detergent">Detergent</option>
          <option value="Personal Care">Personal Care</option>
          <option value="Snacks">Snacks</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" onclick="closeModal('modalProduct')">Cancel</button>
        <button type="submit" class="btn-save" id="productSaveBtn">Save Product</button>
      </div>
    </form>
  </div>
</div>

<!-- Search Modal -->
<div id="modalSearch" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Search & Add to Cart</h3>
      <button class="close-btn" onclick="closeModal('modalSearch')">✕</button>
    </div>
    <div class="search-bar">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="search" id="searchInput" placeholder="Search by name or barcode..." oninput="liveSearch(this.value)" autofocus />
    </div>
    <div id="searchResults" class="search-results"></div>
  </div>
</div>

<!-- Checkout / Bill Modal -->
<div id="modalCheckout" class="modal">
  <div class="modal-content checkout-modal">
    <div class="modal-header">
      <h3>Bill & Payment</h3>
      <button class="close-btn" onclick="closeModal('modalCheckout')">✕</button>
    </div>
    <div id="billContent" class="bill-content">
      <!-- dynamically generated -->
    </div>
    <div class="checkout-actions">
      <button class="btn-print" onclick="printBill()">
        <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
        Print Bill
      </button>
      <button class="btn-complete" onclick="completeSale()">
        <svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>
        Complete Sale
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Print area (hidden) -->
<div id="printArea" class="print-area" style="display:none"></div>

<script src="/app.js"></script>
</body>
</html>
